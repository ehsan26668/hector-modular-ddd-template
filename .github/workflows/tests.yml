name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DOTNET_VERSION: 10.0.x
  CONFIGURATION: Release
  SOLUTION_FILE: Hector.slnx
  TEST_RESULTS_ROOT: ./artifacts/test-results
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_NOLOGO: true

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.filter.outputs.src }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for code changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            src:
              - '**/*.cs'
              - '**/*.csproj'
              - '**/*.props'
              - '**/*.targets'
              - '**/*.slnx'
              - '.github/workflows/**'
              - '.template.config/**'
              - 'src/**'
              - 'tests/**'
              - 'Directory.Build.props'
              - 'Directory.Packages.props'

  unit-tests:
    name: Unit Tests
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.src == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ env.DOTNET_VERSION }}-${{ hashFiles('Directory.Packages.props', 'Directory.Build.props', '**/*.csproj', '**/*.props', '**/*.targets', 'Hector.slnx') }}
          restore-keys: |
            ${{ runner.os }}-nuget-${{ env.DOTNET_VERSION }}-
            ${{ runner.os }}-nuget-

      - name: Restore solution
        run: dotnet restore ${{ env.SOLUTION_FILE }} --verbosity minimal

      - name: Build solution
        run: dotnet build ${{ env.SOLUTION_FILE }} --no-restore --configuration ${{ env.CONFIGURATION }} --verbosity minimal

      - name: Run unit tests
        run: >
          dotnet test ${{ env.SOLUTION_FILE }}
          --no-build
          --configuration ${{ env.CONFIGURATION }}
          --logger "trx;LogFileName=unit-tests.trx"
          --results-directory ${{ env.TEST_RESULTS_ROOT }}/unit
          --verbosity minimal
          --filter "(FullyQualifiedName!~ArchitectureTests)&(FullyQualifiedName!~IntegrationTests)&(FullyQualifiedName!~TemplateTests)"

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: ${{ env.TEST_RESULTS_ROOT }}/unit/**/*.trx
          if-no-files-found: warn
          retention-days: 14

  integration-tests:
    name: Integration Tests - ${{ matrix.test_project.name }}
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.src == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        test_project:
          - name: Persistence
            path: tests/IntegrationTests/Hector.BuildingBlocks.Persistence.IntegrationTests/Hector.BuildingBlocks.Persistence.IntegrationTests.csproj
            trx: persistence-integration-tests.trx
            results: ./artifacts/test-results/integration/persistence
          - name: Web
            path: tests/IntegrationTests/Hector.BuildingBlocks.Web.IntegrationTests/Hector.BuildingBlocks.Web.IntegrationTests.csproj
            trx: web-integration-tests.trx
            results: ./artifacts/test-results/integration/web
          - name: Projects
            path: tests/IntegrationTests/Hector.Modules.Projects.IntegrationTests/Hector.Modules.Projects.IntegrationTests.csproj
            trx: projects-integration-tests.trx
            results: ./artifacts/test-results/integration/projects

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ env.DOTNET_VERSION }}-${{ hashFiles('Directory.Packages.props', 'Directory.Build.props', '**/*.csproj', '**/*.props', '**/*.targets', 'Hector.slnx') }}
          restore-keys: |
            ${{ runner.os }}-nuget-${{ env.DOTNET_VERSION }}-
            ${{ runner.os }}-nuget-

      - name: Restore solution
        run: dotnet restore ${{ env.SOLUTION_FILE }} --verbosity minimal

      - name: Build solution
        run: dotnet build ${{ env.SOLUTION_FILE }} --no-restore --configuration ${{ env.CONFIGURATION }} --verbosity minimal

      - name: Run integration tests
        run: >
          dotnet test "${{ matrix.test_project.path }}"
          --no-build
          --configuration ${{ env.CONFIGURATION }}
          --logger "trx;LogFileName=${{ matrix.test_project.trx }}"
          --results-directory "${{ matrix.test_project.results }}"
          --verbosity minimal

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results-${{ matrix.test_project.name }}
          path: ${{ matrix.test_project.results }}/**/*.trx
          if-no-files-found: warn
          retention-days: 14

  template-tests:
    name: Template Tests
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.src == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ env.DOTNET_VERSION }}-${{ hashFiles('Directory.Packages.props', 'Directory.Build.props', '**/*.csproj', '**/*.props', '**/*.targets', 'Hector.slnx') }}
          restore-keys: |
            ${{ runner.os }}-nuget-${{ env.DOTNET_VERSION }}-
            ${{ runner.os }}-nuget-

      - name: Restore solution
        run: dotnet restore ${{ env.SOLUTION_FILE }} --verbosity minimal

      - name: Build solution
        run: dotnet build ${{ env.SOLUTION_FILE }} --no-restore --configuration ${{ env.CONFIGURATION }} --verbosity minimal

      - name: Run template tests
        run: >
          dotnet test tests/TemplateTests/Hector.TemplateTests/Hector.TemplateTests.csproj
          --no-build
          --configuration ${{ env.CONFIGURATION }}
          --logger "trx;LogFileName=template-tests.trx"
          --results-directory ${{ env.TEST_RESULTS_ROOT }}/template
          --verbosity minimal

      - name: Upload template test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: template-test-results
          path: ${{ env.TEST_RESULTS_ROOT }}/template/**/*.trx
          if-no-files-found: warn
          retention-days: 14
