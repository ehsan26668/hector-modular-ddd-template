name: PR Validation

on:
  pull_request:
    types:
      - opened
      - edited
      - reopened
      - synchronize
      - labeled
      - unlabeled
      - ready_for_review

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pr-validation-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate-pr-governance:
    name: Validate PR Governance
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Validate PR body and governance rules
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request.number;

            const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number });

            const body = stripComments(normalizeLineEndings(pr.body || ""));
            const labels = (pr.labels || []).map(label => label.name);

            const changedFiles = await github.paginate(
              github.rest.pulls.listFiles,
              { owner, repo, pull_number, per_page: 100 }
            );

            const changedPaths = changedFiles.map(file => file.filename);
            const errors = [];
            const warnings = [];

            const allowedTypeLabels = [
              "type: feat",
              "type: fix",
              "type: refactor",
              "type: test",
              "type: docs",
              "type: chore"
            ];

            const allowedAreaLabels = [
              "area: domain",
              "area: application",
              "area: infrastructure",
              "area: web",
              "area: architecture-tests",
              "area: docs",
              "area: unit-tests",
              "area: integration-tests",
              "area: template-tests"
            ];

            const requiredHeadings = [
              "Summary",
              "Work Item Links",
              "Type",
              "Areas",
              "Scope",
              "Expected Impact",
              "Architecture / ADR Impact",
              "Test Plan",
              "Decision Log",
              "Verification",
              "Documentation Impact",
              "Test Impact",
              "Out of Scope / Follow-up Work",
              "Workflow Exceptions"
            ];

            const architectureImpactOptions = [
              "No architectural or long-lived governance impact",
              "Existing ADR applies",
              "ADR created or updated"
            ];

            const testPlanOptions = [
              "No test plan required",
              "Existing Test Plan applies",
              "Test Plan created or updated"
            ];

            const decisionLogOptions = [
              "Not applicable",
              "Existing entry remains current",
              "Decision Log updated"
            ];

            const documentationImpactOptions = [
              "No documentation changes required",
              "Documentation created or updated"
            ];

            const testImpactOptions = [
              "No test changes required",
              "Tests added or updated",
              "Test strategy or enforcement changed"
            ];

            const workflowExceptionOptions = [
              "No exception",
              "Exception used"
            ];

            const ignoredPlaceholderPattern = /^\s*(n\/a|na|none|not applicable|todo|pending|tbd)\s*$/i;
            const verificationPlaceholderPattern = /^\s*(not run|n\/a|na|none|todo|pending|tbd)\s*$/i;

            const areaPathRules = [
              {
                label: "area: domain",
                patterns: [
                  /^src\/.*\/Domain\/.+/i,
                  /^tests\/.*\/Domain\/.+/i
                ]
              },
              {
                label: "area: application",
                patterns: [
                  /^src\/.*\/Application\/.+/i,
                  /^src\/.*\/Contracts\/.+/i,
                  /^tests\/.*\/Application\/.+/i
                ]
              },
              {
                label: "area: infrastructure",
                patterns: [
                  /^src\/.*\/Infrastructure\/.+/i,
                  /^src\/Framework\/Hector\.BuildingBlocks\.Persistence\/.+/i,
                  /^tests\/.*\/Persistence\/.+/i
                ]
              },
              {
                label: "area: web",
                patterns: [
                  /^src\/Host\/.+/i,
                  /^src\/Framework\/Hector\.BuildingBlocks\.Web\/.+/i,
                  /^tests\/.*\/Web\/.+/i
                ]
              },
              {
                label: "area: architecture-tests",
                patterns: [
                  /^tests\/ArchitectureTests\/.+/i,
                  /^src\/Framework\/Hector\.ArchitectureTests\.Framework\/.+/i
                ]
              },
              {
                label: "area: unit-tests",
                patterns: [
                  /^tests\/UnitTests\/.+/i
                ]
              },
              {
                label: "area: integration-tests",
                patterns: [
                  /^tests\/IntegrationTests\/.+/i
                ]
              },
              {
                label: "area: template-tests",
                patterns: [
                  /^tests\/TemplateTests\/.+/i
                ]
              },
              {
                label: "area: docs",
                patterns: [
                  /^docs\/.+/i,
                  /\.md$/i,
                  /^\.github\/.+/i
                ]
              }
            ];

            function escapeRegex(value) {
              return value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
            }

            function normalizeLineEndings(text) {
              return (text || "").replace(/\r\n/g, "\n");
            }

            function stripComments(text) {
              return (text || "").replace(/<!--[\s\S]*?-->/g, "");
            }

            function normalizeVisibleText(text) {
              return stripComments(text || "").trim();
            }

            function splitLines(text) {
              return normalizeLineEndings(text || "").split("\n");
            }

            function stripCheckboxLines(text) {
              return splitLines(text)
                .filter(line => !/^\s*[-*]\s*\[[ xX]\]\s+/.test(line))
                .join("\n")
                .trim();
            }

            function stripFieldPrefixes(text, fieldNames = []) {
              let result = text || "";

              for (const fieldName of fieldNames) {
                const pattern = new RegExp(`^\\s*${escapeRegex(fieldName)}\\s*:\\s*`, "gim");
                result = result.replace(pattern, "");
              }

              return result.trim();
            }

            function getSectionContent(heading) {
              const lines = splitLines(body);
              const headingPattern = new RegExp(`^##\\s+${escapeRegex(heading)}\\s*$`, "i");
              const anyHeadingPattern = /^##\s+.+$/i;
              const startIndex = lines.findIndex(line => headingPattern.test(line.trim()));

              if (startIndex === -1) {
                return "";
              }

              let endIndex = lines.length;
              for (let index = startIndex + 1; index < lines.length; index++) {
                if (anyHeadingPattern.test(lines[index].trim())) {
                  endIndex = index;
                  break;
                }
              }

              return lines.slice(startIndex + 1, endIndex).join("\n").trim();
            }

            function hasHeading(heading) {
              return new RegExp(`^##\\s+${escapeRegex(heading)}\\s*$`, "im").test(body);
            }

            function getCheckedItemsFromSection(section) {
              return splitLines(getSectionContent(section))
                .map(line => line.match(/^\s*[-*]\s*\[\s*([xX])\s*\]\s+(.+?)\s*$/))
                .filter(Boolean)
                .map(match => match[2].replace(/^`|`$/g, "").trim());
            }

            function getCheckedLabels(section, allowedLabels) {
              const checkedItems = getCheckedItemsFromSection(section);
              return allowedLabels.filter(label => checkedItems.includes(label));
            }

            function hasAnyCheckedCheckbox(section) {
              return getCheckedItemsFromSection(section).length > 0;
            }

            function getDetailsText(section, fieldNames = ["Details", "Note"]) {
              return stripFieldPrefixes(
                stripCheckboxLines(normalizeVisibleText(getSectionContent(section))),
                fieldNames
              );
            }

            function getNamedFieldText(section, fieldName) {
              const lines = splitLines(getSectionContent(section));
              const fieldPattern = new RegExp(`^\\s*${escapeRegex(fieldName)}\\s*:\\s*$`, "i");
              const startIndex = lines.findIndex(line => fieldPattern.test(line.trim()));

              if (startIndex === -1) {
                return "";
              }

              const collected = [];
              for (let index = startIndex + 1; index < lines.length; index++) {
                const line = lines[index];

                if (/^\s*[A-Za-z][A-Za-z /-]*\s*:\s*$/.test(line.trim())) {
                  break;
                }

                collected.push(line);
              }

              return normalizeVisibleText(collected.join("\n"));
            }

            function isMeaningfulText(text, minimumLength = 10, allowedExactValues = []) {
              const normalized = normalizeVisibleText(text).replace(/\s+/g, " ").trim();

              if (!normalized) {
                return false;
              }

              if (allowedExactValues.some(value => normalized.toLowerCase() === value.toLowerCase())) {
                return true;
              }

              if (ignoredPlaceholderPattern.test(normalized)) {
                return false;
              }

              return normalized.length >= minimumLength;
            }

            function pathMatchesAny(patterns) {
              return changedPaths.some(path => patterns.some(pattern => pattern.test(path)));
            }

            function changedPathsFor(patterns) {
              return changedPaths.filter(path => patterns.some(pattern => pattern.test(path)));
            }

            function hasChangedPath(pattern) {
              return changedPaths.some(path => pattern.test(path));
            }

            function addError(message) {
              errors.push(message);
            }

            function addWarning(message) {
              warnings.push(message);
            }

            function validateRequiredHeadings() {
              for (const heading of requiredHeadings) {
                if (!hasHeading(heading)) {
                  addError(`Missing required section: ## ${heading}`);
                }
              }
            }

            function validatePrLabels() {
              const typeLabels = labels.filter(label => label.startsWith("type: "));
              const areaLabels = labels.filter(label => label.startsWith("area: "));
              const invalidTypeLabels = typeLabels.filter(label => !allowedTypeLabels.includes(label));
              const invalidAreaLabels = areaLabels.filter(label => !allowedAreaLabels.includes(label));

              if (invalidTypeLabels.length > 0) {
                addError(`Invalid type label(s) on PR: ${invalidTypeLabels.join(", ")}.`);
              }

              if (invalidAreaLabels.length > 0) {
                addError(`Invalid area label(s) on PR: ${invalidAreaLabels.join(", ")}.`);
              }

              return { typeLabels, areaLabels };
            }

            function validateSummary() {
              const summary = getSectionContent("Summary");
              const normalizedSummary = normalizeVisibleText(summary).toLowerCase();

              const weakSummaryValues = [
                "update",
                "changes",
                "fix",
                "bug fix",
                "refactor",
                "test",
                "minor changes",
                "n/a",
                "na",
                "none"
              ];

              if (!isMeaningfulText(summary, 20)) {
                addError("## Summary must contain a meaningful description with at least 20 characters.");
                return;
              }

              if (weakSummaryValues.includes(normalizedSummary)) {
                addError("## Summary is too vague. Explain what changed and why.");
              }
            }

            function validateWorkItemLinks() {
              const feature = getNamedFieldText("Work Item Links", "Feature");
              const executionItem = getNamedFieldText("Work Item Links", "Task / Bug / Chore");

              if (!isMeaningfulText(feature, 3)) {
                addError("## Work Item Links must include a Feature link or identifier.");
              }

              if (!isMeaningfulText(executionItem, 3)) {
                addError("## Work Item Links must include a Task / Bug / Chore link or identifier.");
              }
            }

            function validateTypeSection(typeLabels) {
              const checkedTypesInBody = getCheckedLabels("Type", allowedTypeLabels);

              if (checkedTypesInBody.length !== 1) {
                addError(`## Type must check exactly one type label. Found ${checkedTypesInBody.length}.`);
              }

              if (typeLabels.length > 1) {
                addError(`PR must not have multiple type labels. Found: ${typeLabels.join(", ")}.`);
              }

              if (
                checkedTypesInBody.length === 1 &&
                typeLabels.length === 1 &&
                checkedTypesInBody[0] !== typeLabels[0]
              ) {
                addWarning(`Type label is not synced yet. Body selected "${checkedTypesInBody[0]}", but PR label is "${typeLabels[0]}".`);
              }

              if (checkedTypesInBody.length === 1 && typeLabels.length === 0) {
                addWarning(`Type label "${checkedTypesInBody[0]}" is selected in the PR body but is not present on the PR yet.`);
              }
            }

            function validateAreasSection(areaLabels) {
              const checkedAreasInBody = getCheckedLabels("Areas", allowedAreaLabels);

              if (checkedAreasInBody.length < 1) {
                addError("## Areas must check at least one area label.");
              }

              const requiredAreasFromPaths = areaPathRules
                .filter(rule => pathMatchesAny(rule.patterns))
                .map(rule => rule.label);

              for (const requiredArea of requiredAreasFromPaths) {
                if (!checkedAreasInBody.includes(requiredArea)) {
                  const rule = areaPathRules.find(item => item.label === requiredArea);
                  const matchingPaths = changedPathsFor(rule.patterns).slice(0, 5);

                  addError(
                    `## Areas must include "${requiredArea}" because these changed files match it: ${matchingPaths.join(", ")}${matchingPaths.length === 5 ? ", ..." : ""}`
                  );
                }
              }

              const checkedAreasWithoutPathMatch = checkedAreasInBody.filter(area => {
                const rule = areaPathRules.find(item => item.label === area);
                return rule && !pathMatchesAny(rule.patterns);
              });

              if (checkedAreasWithoutPathMatch.length > 0) {
                addWarning(
                  `The following areas are checked but no matching path was detected: ${checkedAreasWithoutPathMatch.join(", ")}. Keep them only if the PR has cross-cutting impact.`
                );
              }

              const missingAreaLabels = requiredAreasFromPaths.filter(area => !areaLabels.includes(area));
              if (missingAreaLabels.length > 0) {
                addWarning(
                  `Required PR area labels are missing: ${missingAreaLabels.join(", ")}. If this persists, check the labeler workflow.`
                );
              }
            }

            function validateFlexibleSection(sectionName, minimumLength = 10) {
              const hasChecked = hasAnyCheckedCheckbox(sectionName);
              const details = getDetailsText(sectionName);

              if (!hasChecked && !isMeaningfulText(details, minimumLength)) {
                addError(`## ${sectionName} must include checked items or meaningful details.`);
              }

              return { hasChecked, details };
            }

            function validateExpectedImpact() {
              const text = getSectionContent("Expected Impact");

              if (!isMeaningfulText(text, 20)) {
                addError("## Expected Impact must describe the expected effect with at least 20 meaningful characters.");
              }
            }

            function validateSingleChoiceSection(sectionName, allowedOptions) {
              const checkedItems = getCheckedItemsFromSection(sectionName);
              const validSelections = allowedOptions.filter(option => checkedItems.includes(option));

              if (validSelections.length !== 1) {
                addError(
                  `## ${sectionName} must check exactly one of: ${allowedOptions.map(option => `"${option}"`).join(", ")}.`
                );
                return null;
              }

              return validSelections[0];
            }

            function validateArchitectureAdrImpact() {
              const selection = validateSingleChoiceSection("Architecture / ADR Impact", architectureImpactOptions);
              const adrText = getNamedFieldText("Architecture / ADR Impact", "ADR");
              const rationaleText = getNamedFieldText("Architecture / ADR Impact", "Rationale");

              if (!selection) {
                return { selection: null };
              }

              if (!isMeaningfulText(rationaleText, 15)) {
                addError("## Architecture / ADR Impact must include a meaningful Rationale.");
              }

              if (
                selection === "Existing ADR applies" ||
                selection === "ADR created or updated"
              ) {
                if (!isMeaningfulText(adrText, 3)) {
                  addError(`## Architecture / ADR Impact selected "${selection}", so ADR must be linked or identified.`);
                }
              }

              if (
                selection === "No architectural or long-lived governance impact" &&
                !isMeaningfulText(adrText, 10)
              ) {
                addError("## Architecture / ADR Impact selected 'No architectural or long-lived governance impact', so ADR must explain why no ADR is required.");
              }

              return { selection };
            }

            function validateTestPlan() {
              const selection = validateSingleChoiceSection("Test Plan", testPlanOptions);
              const testPlanText = getNamedFieldText("Test Plan", "Test Plan");
              const rationaleText = getNamedFieldText("Test Plan", "Rationale");

              if (!selection) {
                return { selection: null };
              }

              if (
                selection === "Existing Test Plan applies" ||
                selection === "Test Plan created or updated"
              ) {
                if (!isMeaningfulText(testPlanText, 3)) {
                  addError(`## Test Plan selected "${selection}", so a Test Plan link or identifier is required.`);
                }
              }

              if (selection === "No test plan required" && !isMeaningfulText(rationaleText, 10)) {
                addError("## Test Plan selected 'No test plan required', so Rationale must explain why no test plan is required.");
              }

              return { selection };
            }

            function validateDecisionLog() {
              const selection = validateSingleChoiceSection("Decision Log", decisionLogOptions);
              const details = getDetailsText("Decision Log");

              if (!selection) {
                return { selection: null };
              }

              if (
                selection === "Existing entry remains current" ||
                selection === "Decision Log updated"
              ) {
                if (!isMeaningfulText(details, 10)) {
                  addError(`## Decision Log selected "${selection}", so meaningful details are required.`);
                }
              }

              return { selection };
            }

            function validateVerificationContent() {
              const verification = validateFlexibleSection("Verification", 10);

              if (verificationPlaceholderPattern.test(verification.details)) {
                addError("## Verification cannot contain only placeholder text such as 'not run', 'n/a', 'none', 'todo', 'pending', or 'tbd'.");
              }
            }

            function validateDocumentationImpact() {
              const selection = validateSingleChoiceSection("Documentation Impact", documentationImpactOptions);
              const details = getDetailsText("Documentation Impact");

              if (!selection) {
                return { selection: null, details };
              }

              if (selection === "Documentation created or updated" && !isMeaningfulText(details, 10)) {
                addError("## Documentation Impact selected 'Documentation created or updated', so meaningful details are required.");
              }

              return { selection, details };
            }

            function validateTestImpact() {
              const selection = validateSingleChoiceSection("Test Impact", testImpactOptions);
              const details = getDetailsText("Test Impact");

              if (!selection) {
                return { selection: null, details };
              }

              if (
                (
                  selection === "Tests added or updated" ||
                  selection === "Test strategy or enforcement changed"
                ) &&
                !isMeaningfulText(details, 10)
              ) {
                addError(`## Test Impact selected "${selection}", so meaningful details are required.`);
              }

              return { selection, details };
            }

            function validateOutOfScope() {
              const text = normalizeVisibleText(getSectionContent("Out of Scope / Follow-up Work")).replace(/\s+/g, " ").trim();

              if (!text) {
                addError("## Out of Scope / Follow-up Work must explain deferred work or explicitly say 'None'.");
                return;
              }

              if (/^none$/i.test(text)) {
                return;
              }

              if (!isMeaningfulText(text, 10, ["None"])) {
                addError("## Out of Scope / Follow-up Work must include meaningful deferred-work details or 'None'.");
              }
            }

            function validateWorkflowExceptions() {
              const selection = validateSingleChoiceSection("Workflow Exceptions", workflowExceptionOptions);
              const details = getDetailsText("Workflow Exceptions");

              if (!selection) {
                return { selection: null, details };
              }

              if (selection === "Exception used" && !isMeaningfulText(details, 10)) {
                addError("## Workflow Exceptions selected 'Exception used', so details and follow-up are required.");
              }

              return { selection, details };
            }

            function validateChangedFileImpact(documentationImpact, testImpact) {
              const docsChanged =
                hasChangedPath(/^docs\/.+/i) ||
                hasChangedPath(/\.md$/i) ||
                hasChangedPath(/^\.github\/.+/i);

              const testChanged =
                hasChangedPath(/^tests\/.+/i) ||
                hasChangedPath(/^src\/Framework\/Hector\.ArchitectureTests\.Framework\/.+/i);

              if (
                docsChanged &&
                documentationImpact.selection === "No documentation changes required"
              ) {
                addError("Documentation-related files changed, but ## Documentation Impact is marked as 'No documentation changes required'.");
              }

              if (
                !docsChanged &&
                documentationImpact.selection === "Documentation created or updated"
              ) {
                addWarning("## Documentation Impact is marked as 'Documentation created or updated', but no documentation path was changed. Keep it only if the impact is indirect.");
              }

              if (
                testChanged &&
                testImpact.selection === "No test changes required"
              ) {
                addError("Test-related files changed, but ## Test Impact is marked as 'No test changes required'.");
              }

              if (
                !testChanged &&
                (
                  testImpact.selection === "Tests added or updated" ||
                  testImpact.selection === "Test strategy or enforcement changed"
                )
              ) {
                addWarning("## Test Impact indicates test changes, but no test path was changed. Keep it only if the impact is indirect.");
              }
            }

            validateRequiredHeadings();

            const { typeLabels, areaLabels } = validatePrLabels();

            validateSummary();
            validateWorkItemLinks();
            validateTypeSection(typeLabels);
            validateAreasSection(areaLabels);
            validateFlexibleSection("Scope", 10);
            validateExpectedImpact();
            validateArchitectureAdrImpact();
            validateTestPlan();
            validateDecisionLog();
            validateVerificationContent();

            const documentationImpact = validateDocumentationImpact();
            const testImpact = validateTestImpact();

            validateOutOfScope();
            validateWorkflowExceptions();
            validateChangedFileImpact(documentationImpact, testImpact);

            if (warnings.length > 0) {
              core.warning(`PR Governance Warnings:\n- ${warnings.join("\n- ")}`);
            }

            if (errors.length > 0) {
              core.setFailed(`PR Governance Failed:\n- ${errors.join("\n- ")}`);
              return;
            }

            core.info("PR Governance Check Passed!");
