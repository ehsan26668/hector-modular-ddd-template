name: PR Validation

on:
  pull_request:
    types: [opened, edited, reopened, synchronize, labeled, unlabeled]

permissions:
  contents: read
  pull-requests: read

jobs:
  validate-pr-governance:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR Governance
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || "";
            const labels = (pr.labels || []).map(l => l.name);
            const errors = [];
            const warnings = [];

            // --- Configuration ---
            const allowedTypeLabels = new Set([
              "type: feat",
              "type: fix",
              "type: refactor",
              "type: test",
              "type: docs",
              "type: chore"
            ]);

            const allowedAreaLabels = new Set([
              "area: domain",
              "area: application",
              "area: infrastructure",
              "area: web",
              "area: architecture-tests",
              "area: docs",
              "area: unit-tests",
              "area: integration-tests",
              "area: e2e-tests",
              "area: template-tests"
            ]);

            const requiredHeadings = [
              "Summary",
              "Type",
              "Areas",
              "Scope",
              "Verification",
              "Docs / ADR Impact",
              "Test Impact"
            ];

            // --- Utilities ---
            function escapeRegex(s) {
              return s.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
            }

            function getSectionContent(heading) {
              const pattern = new RegExp(
                `^##\\s+${escapeRegex(heading)}\\s*$([\\s\\S]*?)(?=^##\\s+|$)`,
                "im"
              );
              const match = body.match(pattern);
              return match ? match[1].trim() : "";
            }

            function hasCheckedInSection(section, item) {
              const content = getSectionContent(section);
              return new RegExp(`^\\s*-\\s*\\[x\\]\\s*${escapeRegex(item)}\\s*$`, "im").test(content);
            }

            function checkedCountInSection(section) {
              const content = getSectionContent(section);
              const matches = content.match(/^\s*-\s*\[x\]\s*/gim);
              return matches ? matches.length : 0;
            }

            function stripComments(text) {
              return text.replace(/<!--[\s\S]*?-->/g, "").trim();
            }

            function stripCheckboxLines(text) {
              return text
                .split("\n")
                .filter(line => !/^\s*-\s*\[[ xX]\]\s*/.test(line))
                .join("\n")
                .trim();
            }

            function isMeaningfulText(text) {
              const normalized = stripComments(text)
                .replace(/^Details:\s*/im, "")
                .trim();

              return normalized.length >= 10;
            }

            function getDetailsText(section) {
              const content = getSectionContent(section);
              const withoutCheckboxes = stripCheckboxLines(content);
              return withoutCheckboxes;
            }

            // --- Validations ---
            // 1. Labels
            const typeLabels = labels.filter(l => l.startsWith("type: "));
            const invalidTypeLabels = typeLabels.filter(l => !allowedTypeLabels.has(l));
            const areaLabels = labels.filter(l => l.startsWith("area: "));
            const invalidAreaLabels = areaLabels.filter(l => !allowedAreaLabels.has(l));

            if (typeLabels.length !== 1) {
              errors.push(`Must have exactly 1 type label (found ${typeLabels.length}).`);
            }

            if (invalidTypeLabels.length > 0) {
              errors.push(`Invalid type label(s): ${invalidTypeLabels.join(", ")}.`);
            }

            if (areaLabels.length < 1) {
              errors.push("Must have at least 1 area label.");
            }

            if (invalidAreaLabels.length > 0) {
              errors.push(`Invalid area label(s): ${invalidAreaLabels.join(", ")}.`);
            }

            // 2. Body Structure
            requiredHeadings.forEach(h => {
              if (!new RegExp(`^##\\s+${escapeRegex(h)}\\s*$`, "im").test(body)) {
                errors.push(`Missing: ## ${h}`);
              }
            });

            // 3. Summary
            const summary = getSectionContent("Summary");
            if (!isMeaningfulText(summary) || stripComments(summary).length < 20) {
              errors.push("## Summary: Too short, please provide a meaningful description (minimum 20 characters).");
            }

            // 4. Verification
            const verification = getSectionContent("Verification");
            if (!/-\s*\[x\]/im.test(verification)) {
              errors.push("## Verification: Must select at least one verification method.");
            }

            const verificationText = getDetailsText("Verification");
            if (/not run|n\/a|na|none/im.test(verificationText)) {
              warnings.push("## Verification: Contains ambiguous wording such as 'not run', 'n/a', or 'none'.");
            }

            // 5. Scope
            const scope = getSectionContent("Scope");
            const scopeHasChecked = /-\s*\[x\]/im.test(scope);
            const scopeDetails = getDetailsText("Scope");
            if (!scopeHasChecked && !isMeaningfulText(scopeDetails)) {
              errors.push("## Scope: Add checked scope items or provide meaningful details.");
            }

            // 6. Type/Areas alignment in body (optional governance, but useful)
            const checkedTypeInBody = [
              "type: feat",
              "type: fix",
              "type: refactor",
              "type: test",
              "type: docs",
              "type: chore"
            ].filter(label => new RegExp(`^\\s*-\\s*\\[x\\]\\s*\`${escapeRegex(label)}\`\\s*$`, "im").test(getSectionContent("Type")));

            if (checkedTypeInBody.length !== 1) {
              errors.push(`## Type: Must check exactly one type in the PR body (found ${checkedTypeInBody.length}).`);
            }

            const checkedAreasInBody = [
              "area: domain",
              "area: application",
              "area: infrastructure",
              "area: web",
              "area: architecture-tests",
              "area: docs",
              "area: unit-tests",
              "area: integration-tests",
              "area: e2e-tests",
              "area: template-tests"
            ].filter(label => new RegExp(`^\\s*-\\s*\\[x\\]\\s*\`${escapeRegex(label)}\`\\s*$`, "im").test(getSectionContent("Areas")));

            if (checkedAreasInBody.length < 1) {
              errors.push("## Areas: Must check at least one area in the PR body.");
            }

            // 7. Impact sections
            ["Docs / ADR Impact", "Test Impact"].forEach(section => {
              const isYes = hasCheckedInSection(section, "Yes");
              const isNo = hasCheckedInSection(section, "No");

              if ((isYes && isNo) || (!isYes && !isNo)) {
                errors.push(`${section}: Must check exactly one of 'Yes' or 'No'.`);
              }

              if (isYes) {
                const details = getDetailsText(section);
                if (!isMeaningfulText(details)) {
                  errors.push(`${section}: 'Yes' is checked, so meaningful details are required.`);
                }
              }
            });

            // Output
            if (warnings.length > 0) {
              core.warning(warnings.join("\n"));
            }

            if (errors.length > 0) {
              core.setFailed("PR Governance Failed:\n- " + errors.join("\n- "));
            } else {
              core.info("PR Governance Check Passed!");
            }
