name: PR Validation

on:
  pull_request:
    types:
      - opened
      - edited
      - reopened
      - synchronize
      - labeled
      - unlabeled
      - ready_for_review

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pr-validation-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate-pr-governance:
    name: Validate PR Governance
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Validate PR body and governance rules
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request.number;

            const { data: pr } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number
            });

            const body = stripComments(normalizeLineEndings(pr.body || ""));
            const labels = (pr.labels || []).map(label => label.name);

            const changedFiles = await github.paginate(
              github.rest.pulls.listFiles,
              {
                owner,
                repo,
                pull_number,
                per_page: 100
              }
            );

            const changedPaths = changedFiles.map(file => file.filename);

            const errors = [];
            const warnings = [];

            const allowedTypeLabels = [
              "type: feat",
              "type: fix",
              "type: refactor",
              "type: test",
              "type: docs",
              "type: chore"
            ];

            const allowedAreaLabels = [
              "area: domain",
              "area: application",
              "area: infrastructure",
              "area: web",
              "area: architecture-tests",
              "area: docs",
              "area: unit-tests",
              "area: integration-tests",
              "area: template-tests"
            ];

            const requiredHeadings = [
              "Summary",
              "Type",
              "Areas",
              "Scope",
              "Verification",
              "Docs / ADR Impact",
              "Test Impact"
            ];

            const impactBinaryOptions = ["Yes", "No"];

            const ignoredPlaceholderPattern = /^\s*(n\/a|na|none|not applicable|todo|pending)\s*$/i;
            const verificationPlaceholderPattern = /^\s*(not run|n\/a|na|none|todo|pending)\s*$/i;

            // Keep synchronized with path-based governance / labeler behavior.
            const areaPathRules = [
              {
                label: "area: domain",
                patterns: [
                  /^src\/.*\/Domain\/.+/i,
                  /^tests\/.*\/Domain\/.+/i
                ]
              },
              {
                label: "area: application",
                patterns: [
                  /^src\/.*\/Application\/.+/i,
                  /^src\/.*\/Contracts\/.+/i,
                  /^tests\/.*\/Application\/.+/i
                ]
              },
              {
                label: "area: infrastructure",
                patterns: [
                  /^src\/.*\/Infrastructure\/.+/i,
                  /^src\/Framework\/Hector\.BuildingBlocks\.Persistence\/.+/i,
                  /^tests\/.*\/Persistence\/.+/i
                ]
              },
              {
                label: "area: web",
                patterns: [
                  /^src\/Host\/.+/i,
                  /^src\/Framework\/Hector\.BuildingBlocks\.Web\/.+/i,
                  /^tests\/.*\/Web\/.+/i
                ]
              },
              {
                label: "area: architecture-tests",
                patterns: [
                  /^tests\/ArchitectureTests\/.+/i,
                  /^src\/Framework\/Hector\.ArchitectureTests\.Framework\/.+/i
                ]
              },
              {
                label: "area: unit-tests",
                patterns: [
                  /^tests\/UnitTests\/.+/i
                ]
              },
              {
                label: "area: integration-tests",
                patterns: [
                  /^tests\/IntegrationTests\/.+/i
                ]
              },
              {
                label: "area: template-tests",
                patterns: [
                  /^tests\/TemplateTests\/.+/i
                ]
              },
              {
                label: "area: docs",
                patterns: [
                  /^docs\/.+/i,
                  /\.md$/i,
                  /^\.github\/.+/i
                ]
              }
            ];

            function escapeRegex(value) {
              return value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
            }

            function normalizeLineEndings(text) {
              return (text || "").replace(/\r\n/g, "\n");
            }

            function stripComments(text) {
              return (text || "").replace(/<!--[\s\S]*?-->/g, "");
            }

            function normalizeVisibleText(text) {
              return stripComments(text || "").trim();
            }

            function splitLines(text) {
              return normalizeLineEndings(text || "").split("\n");
            }

            function stripCheckboxLines(text) {
              return splitLines(text)
                .filter(line => !/^\s*[-*]\s*\[[ xX]\]\s+/.test(line))
                .join("\n")
                .trim();
            }

            function stripDetailsPrefix(text) {
              return (text || "").replace(/^\s*Details:\s*/im, "").trim();
            }

            function getSectionContent(heading) {
              const pattern = new RegExp(
                `^##\\s+${escapeRegex(heading)}\\s*\\n+([\\s\\S]*?)(?=\\n^##\\s+.+|$)`,
                "im"
              );

              const match = body.match(pattern);
              return match ? match[1].trim() : "";
            }

            function hasHeading(heading) {
              return new RegExp(`^##\\s+${escapeRegex(heading)}\\s*`, "im").test(body);
            }

            function getCheckedItemsFromSection(section) {
              const content = getSectionContent(section);

              return splitLines(content)
                .map(line => line.match(/^\s*[-*]\s*\[\s*([xX])\s*\]\s+(.+?)\s*$/))
                .filter(Boolean)
                .map(match => match[2].replace(/^`|`$/g, "").trim());
            }

            function isCheckedInSection(section, item) {
              return getCheckedItemsFromSection(section).includes(item);
            }

            function getCheckedLabels(section, allowedLabels) {
              const checkedItems = getCheckedItemsFromSection(section);
              return allowedLabels.filter(label => checkedItems.includes(label));
            }

            function hasAnyCheckedCheckbox(section) {
              return getCheckedItemsFromSection(section).length > 0;
            }

            function getDetailsText(section) {
              const content = getSectionContent(section);
              return stripDetailsPrefix(stripCheckboxLines(normalizeVisibleText(content)));
            }

            function isMeaningfulText(text, minimumLength = 10) {
              const normalized = stripDetailsPrefix(normalizeVisibleText(text))
                .replace(/\s+/g, " ")
                .trim();

              if (!normalized) {
                return false;
              }

              if (ignoredPlaceholderPattern.test(normalized)) {
                return false;
              }

              return normalized.length >= minimumLength;
            }

            function pathMatchesAny(patterns) {
              return changedPaths.some(path => patterns.some(pattern => pattern.test(path)));
            }

            function changedPathsFor(patterns) {
              return changedPaths.filter(path => patterns.some(pattern => pattern.test(path)));
            }

            function hasChangedPath(pattern) {
              return changedPaths.some(path => pattern.test(path));
            }

            function addError(message) {
              errors.push(message);
            }

            function addWarning(message) {
              warnings.push(message);
            }

            function validateRequiredHeadings() {
              for (const heading of requiredHeadings) {
                if (!hasHeading(heading)) {
                  addError(`Missing required section: ## ${heading}`);
                }
              }
            }

            function validatePrLabels() {
              const typeLabels = labels.filter(label => label.startsWith("type: "));
              const invalidTypeLabels = typeLabels.filter(label => !allowedTypeLabels.includes(label));

              const areaLabels = labels.filter(label => label.startsWith("area: "));
              const invalidAreaLabels = areaLabels.filter(label => !allowedAreaLabels.includes(label));

              if (invalidTypeLabels.length > 0) {
                addError(`Invalid type label(s) on PR: ${invalidTypeLabels.join(", ")}.`);
              }

              if (invalidAreaLabels.length > 0) {
                addError(`Invalid area label(s) on PR: ${invalidAreaLabels.join(", ")}.`);
              }

              return { typeLabels, areaLabels };
            }

            function validateSummary() {
              const summary = getSectionContent("Summary");
              const normalizedSummary = normalizeVisibleText(summary).toLowerCase();

              const weakSummaryValues = [
                "update",
                "changes",
                "fix",
                "bug fix",
                "refactor",
                "test",
                "minor changes",
                "n/a",
                "na",
                "none"
              ];

              if (!isMeaningfulText(summary, 20)) {
                addError("## Summary must contain a meaningful description with at least 20 characters.");
                return;
              }

              if (weakSummaryValues.includes(normalizedSummary)) {
                addError("## Summary is too vague. Explain what changed and why.");
              }
            }

            function validateTypeSection(typeLabels) {
              const checkedTypesInBody = getCheckedLabels("Type", allowedTypeLabels);

              if (checkedTypesInBody.length !== 1) {
                addError(`## Type must check exactly one type label. Found ${checkedTypesInBody.length}.`);
              }

              if (typeLabels.length > 1) {
                addError(`PR must not have multiple type labels. Found: ${typeLabels.join(", ")}.`);
              }

              if (
                checkedTypesInBody.length === 1 &&
                typeLabels.length === 1 &&
                checkedTypesInBody[0] !== typeLabels[0]
              ) {
                addWarning(
                  `Type label is not synced yet. Body selected "${checkedTypesInBody[0]}", but PR label is "${typeLabels[0]}".`
                );
              }

              if (checkedTypesInBody.length === 1 && typeLabels.length === 0) {
                addWarning(
                  `Type label "${checkedTypesInBody[0]}" is selected in the PR body but is not present on the PR yet.`
                );
              }
            }

            function validateAreasSection(areaLabels) {
              const checkedAreasInBody = getCheckedLabels("Areas", allowedAreaLabels);

              if (checkedAreasInBody.length < 1) {
                addError("## Areas must check at least one area label.");
              }

              const requiredAreasFromPaths = areaPathRules
                .filter(rule => pathMatchesAny(rule.patterns))
                .map(rule => rule.label);

              for (const requiredArea of requiredAreasFromPaths) {
                if (!checkedAreasInBody.includes(requiredArea)) {
                  const rule = areaPathRules.find(item => item.label === requiredArea);
                  const matchingPaths = changedPathsFor(rule.patterns).slice(0, 5);

                  addError(
                    `## Areas must include "${requiredArea}" because these changed files match it: ${matchingPaths.join(", ")}${matchingPaths.length === 5 ? ", ..." : ""}`
                  );
                }
              }

              const checkedAreasWithoutPathMatch = checkedAreasInBody.filter(area => {
                const rule = areaPathRules.find(item => item.label === area);
                return rule && !pathMatchesAny(rule.patterns);
              });

              if (checkedAreasWithoutPathMatch.length > 0) {
                addWarning(
                  `The following areas are checked but no matching path was detected: ${checkedAreasWithoutPathMatch.join(", ")}. Keep them only if the PR has cross-cutting impact.`
                );
              }

              const missingAreaLabels = requiredAreasFromPaths.filter(area => !areaLabels.includes(area));
              if (missingAreaLabels.length > 0) {
                addWarning(
                  `Required PR area labels are missing: ${missingAreaLabels.join(", ")}. If this persists, check the labeler workflow.`
                );
              }
            }

            function validateFlexibleSection(sectionName, minimumLength = 10) {
              const hasChecked = hasAnyCheckedCheckbox(sectionName);
              const details = getDetailsText(sectionName);

              if (!hasChecked && !isMeaningfulText(details, minimumLength)) {
                addError(`## ${sectionName} must include checked items or meaningful details.`);
              }

              return { hasChecked, details };
            }

            function validateImpactSection(sectionName) {
              const checkedItems = getCheckedItemsFromSection(sectionName);
              const validSelections = checkedItems.filter(item => impactBinaryOptions.includes(item));
              const details = getDetailsText(sectionName);

              const isYes = validSelections.includes("Yes");
              const isNo = validSelections.includes("No");

              if (validSelections.length !== 1 || (isYes && isNo)) {
                addError(`## ${sectionName} must check exactly one of 'Yes' or 'No'.`);
                return { isYes: false, isNo: false, details };
              }

              if (isYes && !isMeaningfulText(details, 10)) {
                addError(`## ${sectionName} has 'Yes' checked, so meaningful details are required.`);
              }

              return { isYes, isNo, details };
            }

            function validateVerificationContent() {
              const verification = validateFlexibleSection("Verification", 10);

              if (verificationPlaceholderPattern.test(verification.details)) {
                addError("## Verification cannot contain only placeholder text such as 'not run', 'n/a', 'none', 'todo', or 'pending'.");
              }
            }

            function validateChangedFileImpact(docsImpact, testImpact) {
              const docsChanged =
                hasChangedPath(/^docs\/.+/i) ||
                hasChangedPath(/\.md$/i) ||
                hasChangedPath(/^\.github\/.+/i);

              const testChanged =
                hasChangedPath(/^tests\/.+/i) ||
                hasChangedPath(/^src\/Framework\/Hector\.ArchitectureTests\.Framework\/.+/i);

              if (docsChanged && docsImpact.isNo) {
                addError("Documentation files changed, but ## Docs / ADR Impact is marked as 'No'.");
              }

              if (!docsChanged && docsImpact.isYes) {
                addWarning("## Docs / ADR Impact is marked as 'Yes', but no documentation path was changed. Keep it only if the impact is indirect.");
              }

              if (testChanged && testImpact.isNo) {
                addError("Test-related files changed, but ## Test Impact is marked as 'No'.");
              }

              if (!testChanged && testImpact.isYes) {
                addWarning("## Test Impact is marked as 'Yes', but no test path was changed. Keep it only if the impact is indirect.");
              }
            }

            validateRequiredHeadings();

            const { typeLabels, areaLabels } = validatePrLabels();

            validateSummary();
            validateTypeSection(typeLabels);
            validateAreasSection(areaLabels);
            validateFlexibleSection("Scope", 10);
            validateVerificationContent();

            const docsImpact = validateImpactSection("Docs / ADR Impact");
            const testImpact = validateImpactSection("Test Impact");

            validateChangedFileImpact(docsImpact, testImpact);

            if (warnings.length > 0) {
              core.warning(`PR Governance Warnings:\n- ${warnings.join("\n- ")}`);
            }

            if (errors.length > 0) {
              core.setFailed(`PR Governance Failed:\n- ${errors.join("\n- ")}`);
              return;
            }

            core.info("PR Governance Check Passed!");
