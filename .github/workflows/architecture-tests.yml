name: Architecture Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  architecture-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Hector.slnx

      - name: Build
        run: dotnet build Hector.slnx --no-restore --configuration Release

      - name: Run Architecture Tests
        run: dotnet test tests/ArchitectureTests/Hector.ArchitectureTests/Hector.ArchitectureTests.csproj --no-build --configuration Release
