name: PR Area Labeler

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: pr-area-labeler-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  label-areas:
    name: Sync area labels from changed files
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Apply area labels from changed files
        uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: true
