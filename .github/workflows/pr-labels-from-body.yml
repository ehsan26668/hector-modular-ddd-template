name: PR Labels From Body

on:
  pull_request_target:
    types: [opened, edited, reopened, synchronize]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: pr-labels-from-body-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  sync-type-label-from-body:
    name: Sync PR Type Label From Body
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Sync type label from PR body checkbox
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || "";

            const managedTypeLabels = [
              "type: feat",
              "type: fix",
              "type: refactor",
              "type: test",
              "type: docs",
              "type: chore"
            ];

            function escapeRegex(value) {
              return value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
            }

            function isChecked(label) {
              const escaped = escapeRegex(label);

              const patterns = [
                new RegExp(`^\\s*[-*]\\s*\\[[xX]\\]\\s*\`${escaped}\`\\s*$`, "m"),
                new RegExp(`^\\s*[-*]\\s*\\[[xX]\\]\\s*${escaped}\\s*$`, "m")
              ];

              return patterns.some(pattern => pattern.test(body));
            }

            const selectedTypeLabels = managedTypeLabels.filter(isChecked);

            if (selectedTypeLabels.length !== 1) {
              core.setFailed(
                `Exactly one type label must be selected in the PR body. Found ${selectedTypeLabels.length}: ${selectedTypeLabels.join(", ") || "(none)"}`
              );
              return;
            }

            const desiredTypeLabel = selectedTypeLabels[0];
            const existingLabels = pr.labels.map(label => label.name);
            const existingManagedTypeLabels = existingLabels.filter(label => managedTypeLabels.includes(label));

            const labelsToAdd = existingLabels.includes(desiredTypeLabel) ? [] : [desiredTypeLabel];
            const labelsToRemove = existingManagedTypeLabels.filter(label => label !== desiredTypeLabel);

            core.info(`Desired type label: ${desiredTypeLabel}`);
            core.info(`Existing managed type labels: ${existingManagedTypeLabels.join(", ") || "(none)"}`);
            core.info(`Type labels to add: ${labelsToAdd.join(", ") || "(none)"}`);
            core.info(`Type labels to remove: ${labelsToRemove.join(", ") || "(none)"}`);

            if (labelsToAdd.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: labelsToAdd
              });
            }

            for (const label of labelsToRemove) {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  name: label
                });
              } catch (error) {
                if (error.status === 404) {
                  core.info(`Label "${label}" was already removed.`);
                } else {
                  throw error;
                }
              }
            }

            core.info("PR type label synchronized successfully.");
